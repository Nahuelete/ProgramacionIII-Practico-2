<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/pages/registro.css" />
</head>

<body>
    <div class="lluvia"></div>

    <header>
        <div class="container_logo">
            <h1>Cine Aurora</h1>
            <img class="logo_imagen" src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" />
        </div>
        <nav>
            <a href="../index.html">Inicio</a>
            <a href="./estrenos.html">Próximos estrenos</a>
            <a href="../index.html">Volver</a>
        </nav>
    </header>

    <main class="registro-main">
        <div class="registro-container">
            <form class="login-form" action="login.html">
                <h2>Crear nueva cuenta</h2>
                
                <div class="input-group">
                    <label>Nombre Completo</label>
                    <input type="text" required />
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" required />
                </div>
                <div class="input-group">
                    <label>Fecha de nacimiento</label>
                    <input type="date" required />
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" required />
                </div>
                <div class="input-group">
                    <label>Confirmar contraseña</label>
                    <input type="password" required />
                </div>

                <hr />

                <div class="container_desplegable">
                    <button type="button" class="toggle_datos">¿Quieres ayudarnos a mejorar? ↓</button>
                    
                    <div class="seccion-desplegable">
                        <p class="p_Mensaje">Estos datos nos ayudan a mejorar tu experiencia.</p>
                        
                        <div class="input-group">
                            <label>Elegí tu color favorito para las butacas</label>
                            <input type="color" />
                        </div>

                        <div class="input-group">
                            <label>¿Cuántas entradas comprás en general? (0-10)</label>
                            <input type="range" min="0" max="10" />
                        </div>

                        <div class="input-group">
                            <label>Seleccioná tu género favorito</label>
                            <select>
                                <option>Acción</option>
                                <option>Drama</option>
                                <option>Ciencia ficción</option>
                                <option>Terror</option>
                                <option>Comedia</option>
                            </select>
                        </div>

                        <div class="snack-group">
                            <label>Elegí tu snack favorito:</label>
                            <div class="radio-option">
                                <input type="radio" name="snack" id="dulce"> <label for="dulce">Pochoclo dulce</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="snack" id="salado"> <label for="salado">Pochoclo salado</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="snack" id="choc"> <label for="choc">Chocolate</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="btn-dropdown-wrapper">
                    <button type="submit" class="btn-principal">Regístrate</button>
                    
                    <div class="dropdown-content">
                        <p>¿Ya tienes cuenta?</p>
                        <a href="#">Iniciar Sesión</a>
                        <hr>
                        <a href="#">Términos y Condiciones</a>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
    </footer>

    <script src="../js/registro.js"></script>
</body>
</html>
